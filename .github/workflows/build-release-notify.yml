name: Build, Sign and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag, for example 1.4, v1.4-beta2, or v1.4-build-75"
        required: true
        default: "1.4"
      build_number:
        description: "Optional build number; defaults to the GitHub Actions run number"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: freecleaner-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Resolve release metadata
    runs-on: windows-2022
    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
      base_version: ${{ steps.version.outputs.base_version }}
      windows_version: ${{ steps.version.outputs.windows_version }}
      build_number: ${{ steps.version.outputs.build_number }}
      full_version: ${{ steps.version.outputs.full_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve canonical version
        id: version
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Normalize-Version([string]$Version) {
            $parts = $Version.Split('.')
            if ($parts.Count -lt 1 -or $parts.Count -gt 4) {
              throw "Version '$Version' must contain between one and four numeric parts."
            }
            $normalized = @()
            foreach ($part in $parts) {
              if ($part -notmatch '^\d+$') {
                throw "Version '$Version' contains a non-numeric part."
              }
              $normalized += [int]$part
            }
            while ($normalized.Count -lt 4) {
              $normalized += 0
            }
            return ($normalized -join '.')
          }

          $rawTag = if ($env:EVENT_NAME -eq 'push') {
            $env:REF_NAME
          } else {
            $env:INPUT_VERSION.Trim()
          }

          if ([string]::IsNullOrWhiteSpace($rawTag)) {
            throw 'A release version is required.'
          }
          if (-not $rawTag.StartsWith('v', [System.StringComparison]::OrdinalIgnoreCase)) {
            $rawTag = "v$rawTag"
          }

          $pattern = '^v(?<base>\d+(?:\.\d+){0,3})(?:-(?<pre>alpha\d*|beta\d*|rc\d*))?(?:-build-(?<build>\d+))?$'
          $match = [regex]::Match($rawTag, $pattern, [System.Text.RegularExpressions.RegexOptions]::IgnoreCase)
          if (-not $match.Success) {
            throw "Release tag '$rawTag' must use v<version>[-alphaN|-betaN|-rcN][-build-<number>]."
          }

          $baseVersion = $match.Groups['base'].Value
          $preLabel = $match.Groups['pre'].Value
          $embeddedBuild = $match.Groups['build'].Value

          if (-not [string]::IsNullOrWhiteSpace($embeddedBuild)) {
            $buildNumber = [int]$embeddedBuild
            if (-not [string]::IsNullOrWhiteSpace($env:INPUT_BUILD_NUMBER) -and [int]$env:INPUT_BUILD_NUMBER -ne $buildNumber) {
              throw "Embedded build number '$buildNumber' conflicts with workflow input '$($env:INPUT_BUILD_NUMBER)'."
            }
          } elseif (-not [string]::IsNullOrWhiteSpace($env:INPUT_BUILD_NUMBER)) {
            $buildNumber = [int]$env:INPUT_BUILD_NUMBER
          } else {
            $buildNumber = [int]$env:RUN_NUMBER
          }

          if ($buildNumber -lt 1) {
            throw 'Build number must be greater than zero.'
          }

          $windowsVersion = Normalize-Version $baseVersion
          $fullVersion = "$windowsVersion-build-$buildNumber"

          if ($env:EVENT_NAME -eq 'push') {
            $tagName = $rawTag
          } else {
            $prePart = if ([string]::IsNullOrWhiteSpace($preLabel)) { '' } else { "-$preLabel" }
            $tagName = "v$baseVersion$prePart-build-$buildNumber"
          }

          $isPrerelease = -not [string]::IsNullOrWhiteSpace($preLabel)

          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "base_version=$baseVersion" >> $env:GITHUB_OUTPUT
          "windows_version=$windowsVersion" >> $env:GITHUB_OUTPUT
          "build_number=$buildNumber" >> $env:GITHUB_OUTPUT
          "full_version=$fullVersion" >> $env:GITHUB_OUTPUT
          "is_prerelease=$($isPrerelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          Write-Host "Tag: $tagName"
          Write-Host "Full version: $fullVersion"
          Write-Host "Prerelease: $isPrerelease"

      - name: Validate resolved release metadata
        shell: pwsh
        run: |
          python scripts/validate_release_metadata.py `
            --tag "${{ steps.version.outputs.tag_name }}" `
            --build-number "${{ steps.version.outputs.build_number }}" `
            --full-version "${{ steps.version.outputs.full_version }}"

  quality:
    name: Quality and dependency audit
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"
          cache: pip

      - name: Install validation dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements-dev.txt

      - name: Validate source tree
        run: python -B scripts/validate_source_tree.py

      - name: Validate translations
        run: python -B scripts/validate_translations.py

      - name: Ruff
        run: python -m ruff check . --no-cache

      - name: Unit and Qt tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -B -m pytest -q -p no:cacheprovider

      - name: Dependency security audit
        run: python -m pip_audit -r requirements.txt --progress-spinner off

  build:
    name: Build x64 EXE and installer
    needs: [version, quality]
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      APP_NAME: FreeCleaner
      COMPANY_NAME: FreeCleaner
      INTERNAL_NAME: FreeCleaner
      FILE_DESCRIPTION: FreeCleaner Windows system cleaner
      SPEC_FILE: FreeCleaner.spec
      PYTHON_VERSION: "3.13"
      EXPECTED_SIGNING_SUBJECT: FreeCleaner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python x64
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64
          cache: pip

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt

      - name: Require release signing secrets
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_BASE64)) {
            throw 'WINDOWS_SIGNING_CERTIFICATE_BASE64 secret is required for releases.'
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD)) {
            throw 'WINDOWS_SIGNING_CERTIFICATE_PASSWORD secret is required for releases.'
          }

      - name: Import and trust release signing certificate
        shell: powershell
        timeout-minutes: 5
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'

          $pfxPath = Join-Path $env:RUNNER_TEMP 'freecleaner-signing.pfx'
          $cerPath = Join-Path $env:RUNNER_TEMP 'freecleaner-signing.cer'
          $base64 = $env:WINDOWS_SIGNING_CERTIFICATE_BASE64 -replace '\s', ''

          try {
            $pfxBytes = [Convert]::FromBase64String($base64)
          } catch {
            throw 'WINDOWS_SIGNING_CERTIFICATE_BASE64 is not valid Base64. Copy only the complete contents of the generated Base64 file.'
          }
          if ($pfxBytes.Length -lt 512) {
            throw "Decoded PFX is unexpectedly small ($($pfxBytes.Length) bytes). The Base64 secret is incomplete."
          }
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          $securePassword = ConvertTo-SecureString `
            $env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD `
            -AsPlainText `
            -Force

          try {
            $pfxData = Get-PfxData -FilePath $pfxPath -Password $securePassword
          } catch {
            throw "The PFX cannot be opened. Check WINDOWS_SIGNING_CERTIFICATE_PASSWORD and regenerate the certificate if needed. $($_.Exception.Message)"
          }

          $pfxCertificates = @(
            @($pfxData.EndEntityCertificates)
            @($pfxData.OtherCertificates)
            @($pfxData.RootCertificates)
          ) | Where-Object { $_ -ne $null }
          $pfxThumbprints = @($pfxCertificates | ForEach-Object { $_.Thumbprint })
          if ($pfxThumbprints.Count -eq 0) {
            throw 'The PFX does not contain any certificate.'
          }

          try {
            Import-PfxCertificate `
              -FilePath $pfxPath `
              -CertStoreLocation 'Cert:\CurrentUser\My' `
              -Password $securePassword `
              -Exportable | Out-Null
          } catch {
            throw "The PFX could not be imported with its private key. $($_.Exception.Message)"
          }

          # -CodeSigningCert is the authoritative PowerShell filter: it only
          # returns certificates with code-signing authority and a private key.
          $cert = Get-ChildItem -Path 'Cert:\CurrentUser\My' -CodeSigningCert |
            Where-Object { $pfxThumbprints -contains $_.Thumbprint } |
            Select-Object -First 1

          if (-not $cert) {
            $importedFromPfx = @(
              Get-ChildItem -Path 'Cert:\CurrentUser\My' |
                Where-Object { $pfxThumbprints -contains $_.Thumbprint }
            )
            $privateKeyCert = $importedFromPfx |
              Where-Object { $_.HasPrivateKey } |
              Select-Object -First 1

            if (-not $privateKeyCert) {
              throw 'The PFX contains a certificate, but its private key is missing or cannot be imported. Regenerate the PFX and replace both GitHub secrets.'
            }

            $ekuText = @($privateKeyCert.EnhancedKeyUsageList | ForEach-Object { $_.FriendlyName + ' [' + $_.ObjectId.Value + ']' }) -join ', '
            if ([string]::IsNullOrWhiteSpace($ekuText)) {
              $ekuText = '<none>'
            }
            throw "The certificate has a private key but is not a code-signing certificate. Required EKU: 1.3.6.1.5.5.7.3.3. Present EKUs: $ekuText. Regenerate it with scripts\create_self_signed_release_certificate.bat."
          }

          if ($cert.Subject -notlike "*$env:EXPECTED_SIGNING_SUBJECT*") {
            throw "Certificate subject '$($cert.Subject)' does not contain '$env:EXPECTED_SIGNING_SUBJECT'."
          }

          $isSelfSigned = $cert.Subject -eq $cert.Issuer
          if (-not $isSelfSigned) {
            Write-Host 'A CA-issued certificate was supplied; normal chain trust will be used.'
          } else {
            Write-Host 'Self-signed release certificate detected. Adding temporary trust to this isolated runner.'

            Export-Certificate -Cert $cert -FilePath $cerPath -Force | Out-Null

            # Import-Certificate (and the equivalent .NET X509Store.Add call)
            # routes Root-store additions through CryptUI's "install this
            # certificate?" confirmation, which has no one to answer it on a
            # runner and hangs until the job hits its timeout. certutil's
            # -enterprise store bypasses that interactive trust prompt while
            # still making the runner treat the certificate as trusted.
            $certutilOutput = & certutil.exe -addstore -enterprise -f 'Root' $cerPath 2>&1
            if ($LASTEXITCODE -ne 0) {
              throw "certutil failed to add the certificate to the enterprise Root store (exit $LASTEXITCODE): $certutilOutput"
            }

            # Reading the store (as opposed to writing to it) never triggers
            # the CryptUI trust prompt, so this check is safe to run and
            # confirms the enterprise-store import actually took effect.
            $rootCert = Get-ChildItem -Path 'Cert:\CurrentUser\Root' |
              Where-Object { $_.Thumbprint -eq $cert.Thumbprint }
            if (-not $rootCert) {
              throw 'Certificate was not found in Cert:\CurrentUser\Root after the certutil enterprise import.'
            }

            Import-Certificate `
              -FilePath $cerPath `
              -CertStoreLocation 'Cert:\CurrentUser\TrustedPublisher' | Out-Null
          }

          $sha = [System.Security.Cryptography.SHA256]::Create()
          try {
            $hashBytes = $sha.ComputeHash($cert.RawData)
          } finally {
            $sha.Dispose()
          }
          $certSha256 = ($hashBytes | ForEach-Object { $_.ToString('x2') }) -join ''

          @(
            "SIGNING_CERT_THUMBPRINT=$($cert.Thumbprint)"
            "SIGNING_CERT_SHA256=$certSha256"
            "SIGNING_CERT_SUBJECT=$($cert.Subject)"
            "SIGNING_CERT_SELF_SIGNED=$($isSelfSigned.ToString().ToLowerInvariant())"
            "SIGNING_PFX_PATH=$pfxPath"
            "SIGNING_CER_PATH=$cerPath"
          ) | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Publisher: $($cert.Subject)"
          Write-Host "Thumbprint: $($cert.Thumbprint)"
          Write-Host "SHA-256 certificate pin: $certSha256"

      - name: Embed release certificate pin in updater
        shell: pwsh
        env:
          WINDOWS_NEXT_SIGNING_CERTIFICATE_SHA256: ${{ secrets.WINDOWS_NEXT_SIGNING_CERTIFICATE_SHA256 }}
        run: |
          $subject = $env:SIGNING_CERT_SUBJECT.Replace('\', '\\').Replace('"', '\"')
          $pins = @($env:SIGNING_CERT_SHA256)
          $nextPin = ($env:WINDOWS_NEXT_SIGNING_CERTIFICATE_SHA256 -replace '^sha256:', '').Trim().ToLowerInvariant()
          if (-not [string]::IsNullOrWhiteSpace($nextPin)) {
            if ($nextPin -notmatch '^[0-9a-f]{64}$') {
              throw 'WINDOWS_NEXT_SIGNING_CERTIFICATE_SHA256 must contain a 64-character SHA-256 fingerprint.'
            }
            if ($pins -notcontains $nextPin) {
              $pins += $nextPin
            }
          }
          $pinTuple = ($pins | ForEach-Object { '"{0}"' -f $_ }) -join ', '
          if ($pins.Count -eq 1) {
            $pinTuple += ','
          }
          $module = @"
          """Build-time update trust anchors generated by GitHub Actions."""

          UPDATE_SIGNING_CERT_SHA256 = "$env:SIGNING_CERT_SHA256"
          UPDATE_SIGNING_CERT_SHA256_PINS = ($pinTuple)
          UPDATE_SIGNING_CERT_SUBJECT = "$subject"
          "@
          [IO.File]::WriteAllText(
            (Join-Path $PWD 'freecleaner/build_trust.py'),
            $module.TrimStart(),
            [Text.UTF8Encoding]::new($false)
          )
          Get-Content freecleaner/build_trust.py

      - name: Generate Windows version metadata
        shell: pwsh
        run: |
          python scripts/generate_version_info.py `
            --base-version "${{ needs.version.outputs.windows_version }}" `
            --build-number "${{ needs.version.outputs.build_number }}" `
            --product-name "${{ env.APP_NAME }}" `
            --company-name "${{ env.COMPANY_NAME }}" `
            --internal-name "${{ env.INTERNAL_NAME }}" `
            --original-filename "FreeCleaner.exe" `
            --file-description "${{ env.FILE_DESCRIPTION }} (x64)" `
            --output version_info.txt

          python scripts/validate_release_metadata.py `
            --tag "${{ needs.version.outputs.tag_name }}" `
            --build-number "${{ needs.version.outputs.build_number }}" `
            --full-version "${{ needs.version.outputs.full_version }}" `
            --version-info version_info.txt

      - name: Build executable with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller "${{ env.SPEC_FILE }}" --noconfirm --clean
          $packageDir = Join-Path $PWD 'dist\FreeCleaner'
          $exePath = Join-Path $packageDir 'FreeCleaner.exe'
          if (-not (Test-Path -LiteralPath $exePath)) {
            throw "Built executable was not found: $exePath"
          }
          "PACKAGE_DIR=$packageDir" >> $env:GITHUB_ENV
          "PACKAGE_EXE_PATH=$exePath" >> $env:GITHUB_ENV
          Get-Item -LiteralPath $exePath | Format-List FullName, Length

      - name: Sign and verify packaged executable
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $cert = Get-ChildItem -Path 'Cert:\CurrentUser\My' -CodeSigningCert |
            Where-Object { $_.Thumbprint -eq $env:SIGNING_CERT_THUMBPRINT } |
            Select-Object -First 1
          if (-not $cert) {
            throw 'The imported release certificate is no longer available as a usable code-signing certificate.'
          }

          $result = Set-AuthenticodeSignature `
            -FilePath $env:PACKAGE_EXE_PATH `
            -Certificate $cert `
            -TimestampServer 'http://timestamp.digicert.com' `
            -HashAlgorithm SHA256

          if ($result.Status -ne 'Valid') {
            throw "Executable signing failed: $($result.Status) — $($result.StatusMessage)"
          }

          $signature = Get-AuthenticodeSignature -LiteralPath $env:PACKAGE_EXE_PATH
          if ($signature.Status -ne 'Valid') {
            throw "Executable signature is not valid: $($signature.Status) — $($signature.StatusMessage)"
          }
          if ($signature.SignerCertificate.Thumbprint -ne $env:SIGNING_CERT_THUMBPRINT) {
            throw 'Executable was signed with an unexpected certificate.'
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          .\scripts\build_installer.ps1 `
            -ExePath "$env:PACKAGE_EXE_PATH" `
            -Arch "win64" `
            -Version "${{ needs.version.outputs.full_version }}" `
            -OutputDir "dist"

          $installer = Get-ChildItem `
            -Path dist `
            -File `
            -Filter "FreeCleaner-${{ needs.version.outputs.full_version }}-win64-setup.exe" |
            Select-Object -First 1

          if (-not $installer) {
            throw 'Installer was not generated.'
          }
          "INSTALLER_PATH=$($installer.FullName)" >> $env:GITHUB_ENV

      - name: Sign and verify installer
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $cert = Get-ChildItem -Path 'Cert:\CurrentUser\My' -CodeSigningCert |
            Where-Object { $_.Thumbprint -eq $env:SIGNING_CERT_THUMBPRINT } |
            Select-Object -First 1
          if (-not $cert) {
            throw 'The imported release certificate is no longer available as a usable code-signing certificate.'
          }

          $result = Set-AuthenticodeSignature `
            -FilePath $env:INSTALLER_PATH `
            -Certificate $cert `
            -TimestampServer 'http://timestamp.digicert.com' `
            -HashAlgorithm SHA256

          if ($result.Status -ne 'Valid') {
            throw "Installer signing failed: $($result.Status) — $($result.StatusMessage)"
          }

          $signature = Get-AuthenticodeSignature -LiteralPath $env:INSTALLER_PATH
          if ($signature.Status -ne 'Valid') {
            throw "Installer signature is not valid: $($signature.Status) — $($signature.StatusMessage)"
          }
          if ($signature.SignerCertificate.Thumbprint -ne $env:SIGNING_CERT_THUMBPRINT) {
            throw 'Installer was signed with an unexpected certificate.'
          }

      - name: Stage signed release files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path artifact-out | Out-Null

          $portableName = "FreeCleaner-${{ needs.version.outputs.full_version }}-win64-portable.zip"
          $portablePath = Join-Path (Resolve-Path artifact-out) $portableName
          Compress-Archive -Path (Join-Path $env:PACKAGE_DIR '*') -DestinationPath $portablePath -CompressionLevel Optimal -Force

          Copy-Item -LiteralPath $env:INSTALLER_PATH -Destination artifact-out -Force
          Copy-Item -LiteralPath version_info.txt -Destination artifact-out -Force

          $statusLines = @(
            'FreeCleaner signed release',
            "Publisher: $env:SIGNING_CERT_SUBJECT",
            "Certificate SHA-256: $env:SIGNING_CERT_SHA256",
            "Self-signed transition certificate: $env:SIGNING_CERT_SELF_SIGNED",
            'The in-app updater pins the exact certificate SHA-256 fingerprint.'
          )
          [IO.File]::WriteAllLines(
            (Join-Path (Resolve-Path artifact-out) 'SIGNING_STATUS.txt'),
            $statusLines,
            [Text.UTF8Encoding]::new($false)
          )

          $releaseFiles = Get-ChildItem artifact-out -File |
            Where-Object { $_.Name -ne 'SHA256SUMS.txt' }
          $hashLines = foreach ($file in $releaseFiles) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          [IO.File]::WriteAllLines(
            (Join-Path (Resolve-Path artifact-out) 'SHA256SUMS.txt'),
            $hashLines,
            [Text.UTF8Encoding]::new($false)
          )

          Get-ChildItem artifact-out -File | Format-Table Name, Length

      - name: Upload signed workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeCleaner-${{ needs.version.outputs.full_version }}-win64-signed
          path: artifact-out/*
          if-no-files-found: error
          retention-days: 30

      - name: Remove imported signing certificate
        if: always()
        shell: powershell
        run: |
          $thumbprint = $env:SIGNING_CERT_THUMBPRINT
          if (-not [string]::IsNullOrWhiteSpace($thumbprint)) {
            foreach ($store in @('My', 'Root', 'TrustedPublisher')) {
              $path = "Cert:\CurrentUser\$store\$thumbprint"
              if (Test-Path -LiteralPath $path) {
                Remove-Item -LiteralPath $path -Force
              }
            }
          }
          foreach ($file in @($env:SIGNING_PFX_PATH, $env:SIGNING_CER_PATH)) {
            if (-not [string]::IsNullOrWhiteSpace($file) -and (Test-Path -LiteralPath $file)) {
              Remove-Item -LiteralPath $file -Force
            }
          }

  release:
    name: Create Release & Upload Assets
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: FreeCleaner-${{ needs.version.outputs.full_version }}-win64-signed
          path: release-assets

      - name: Verify release asset manifest
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum --check SHA256SUMS.txt
          test -f "FreeCleaner-${{ needs.version.outputs.full_version }}-win64-setup.exe"
          test -f "FreeCleaner-${{ needs.version.outputs.full_version }}-win64-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: FreeCleaner ${{ needs.version.outputs.full_version }}
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release-assets/FreeCleaner-${{ needs.version.outputs.full_version }}-win64-setup.exe
            release-assets/FreeCleaner-${{ needs.version.outputs.full_version }}-win64-portable.zip
            release-assets/SHA256SUMS.txt
            release-assets/SIGNING_STATUS.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
