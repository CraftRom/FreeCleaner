name: Build, Release and Notify

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      base_version:
        description: 'Base version (examples: 0.2, 0.2.0, 0.2.0.0)'
        required: true
        type: string
        default: '0.2.0.0'
      is_prerelease:
        description: 'Mark release as pre-release'
        required: true
        type: boolean
        default: true

jobs:
  version:
    name: Prepare version
    runs-on: windows-2022
    outputs:
      build_number: ${{ steps.versioning.outputs.build_number }}
      base_version: ${{ steps.versioning.outputs.base_version }}
      windows_version: ${{ steps.versioning.outputs.windows_version }}
      full_version: ${{ steps.versioning.outputs.full_version }}
      tag_name: ${{ steps.versioning.outputs.tag_name }}
      create_tag: ${{ steps.versioning.outputs.create_tag }}
      is_prerelease: ${{ steps.versioning.outputs.is_prerelease }}
    steps:
      - name: Determine version and release status
        id: versioning
        shell: pwsh
        run: |
          $BuildNumber = [int]'${{ github.run_number }}'
          function Normalize-Version([string]$Version) {
            if ([string]::IsNullOrWhiteSpace($Version)) { throw 'Version cannot be empty.' }
            $clean = $Version.Trim()
            if ($clean.StartsWith('v')) { $clean = $clean.Substring(1) }
            if ($clean -match '-') { $clean = $clean.Split('-', 2)[0] }
            $parts = $clean.Split('.', [System.StringSplitOptions]::RemoveEmptyEntries)
            if ($parts.Count -lt 1) { throw "Version '$Version' does not contain any numeric parts." }
            foreach ($p in $parts) { if ($p -notmatch '^\d+$') { throw "Version '$Version' contains a non-numeric part: $p" } }
            return ($parts -join '.')
          }
          function Convert-ToWindowsVersion([string]$Version) {
            $parts = $Version.Split('.', [System.StringSplitOptions]::RemoveEmptyEntries)
            $result = @()
            for ($i = 0; $i -lt 4; $i++) {
              if ($i -lt $parts.Count) { $result += [string][int]$parts[$i] } else { $result += '0' }
            }
            return ($result -join '.')
          }
          if ('${{ github.ref_type }}' -eq 'tag') {
            $TagName = '${{ github.ref_name }}'
            $BaseVersion = Normalize-Version $TagName
            $CreateTag = 'false'
            $IsPrerelease = if ($TagName -match '-(alpha|beta|rc)(\.|\d|$)') { 'true' } else { 'false' }
          } else {
            $BaseVersion = Normalize-Version '${{ github.event.inputs.base_version }}'
            $CreateTag = 'true'
            $IsPrerelease = if ('${{ github.event.inputs.is_prerelease }}' -eq 'true') { 'true' } else { 'false' }
            $TagName = "v$BaseVersion-build-$BuildNumber"
          }
          $WindowsVersion = Convert-ToWindowsVersion $BaseVersion
          $FullVersion = "$WindowsVersion-build-$BuildNumber"
          "build_number=$BuildNumber" >> $env:GITHUB_OUTPUT
          "base_version=$BaseVersion" >> $env:GITHUB_OUTPUT
          "windows_version=$WindowsVersion" >> $env:GITHUB_OUTPUT
          "full_version=$FullVersion" >> $env:GITHUB_OUTPUT
          "tag_name=$TagName" >> $env:GITHUB_OUTPUT
          "create_tag=$CreateTag" >> $env:GITHUB_OUTPUT
          "is_prerelease=$IsPrerelease" >> $env:GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.arch }} EXE
    needs: version
    runs-on: windows-2022
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            python_arch: x86
            asset_suffix: win32
            original_filename: FreeCleaner-win32.exe
          - arch: x64
            python_arch: x64
            asset_suffix: win64
            original_filename: FreeCleaner-win64.exe
    env:
      APP_NAME: FreeCleaner
      COMPANY_NAME: FreeCleaner
      INTERNAL_NAME: FreeCleaner
      FILE_DESCRIPTION: FreeCleaner Windows cleaner, auto system language, and persistent language preference
      SPEC_FILE: FreeCleaner.spec
      PYTHON_VERSION: '3.8'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python_arch }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.python_arch }}
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<25"
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Generate version_info.txt
        shell: pwsh
        run: |
          python scripts/generate_version_info.py `
            --base-version "${{ needs.version.outputs.windows_version }}" `
            --build-number "${{ needs.version.outputs.build_number }}" `
            --product-name "${{ env.APP_NAME }}" `
            --company-name "${{ env.COMPANY_NAME }}" `
            --internal-name "${{ env.INTERNAL_NAME }}" `
            --original-filename "${{ matrix.original_filename }}" `
            --file-description "${{ env.FILE_DESCRIPTION }} (${{ matrix.arch }})" `
            --output version_info.txt

      - name: Build executable with PyInstaller
        shell: pwsh
        run: pyinstaller "${{ env.SPEC_FILE }}" --noconfirm --clean

      - name: Rename packaged executable
        shell: pwsh
        run: |
          $ExePath = Join-Path 'dist' '${{ env.APP_NAME }}.exe'
          if (-not (Test-Path $ExePath)) { throw "Built executable not found: $ExePath" }
          $ExeName = "${{ env.APP_NAME }}-${{ needs.version.outputs.full_version }}-${{ matrix.asset_suffix }}.exe"
          $RenamedExePath = Join-Path 'dist' $ExeName
          Move-Item -Path $ExePath -Destination $RenamedExePath -Force
          "RENAMED_EXE_PATH=$RenamedExePath" >> $env:GITHUB_ENV

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          .\\scripts\\build_installer.ps1 `
            -ExePath "${{ env.RENAMED_EXE_PATH }}" `
            -Arch "${{ matrix.asset_suffix }}" `
            -Version "${{ needs.version.outputs.full_version }}" `
            -OutputDir "dist"
          $InstallerPath = Get-ChildItem -Path dist -Filter "${{ env.APP_NAME }}-${{ needs.version.outputs.full_version }}-${{ matrix.asset_suffix }}-setup.exe" | Select-Object -First 1
          if (-not $InstallerPath) { throw "Installer was not generated." }
          "INSTALLER_PATH=$($InstallerPath.FullName)" >> $env:GITHUB_ENV

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact-out | Out-Null
          Copy-Item -Path "${{ env.RENAMED_EXE_PATH }}" -Destination artifact-out -Force
          Copy-Item -Path "${{ env.INSTALLER_PATH }}" -Destination artifact-out -Force
          Copy-Item -Path version_info.txt -Destination artifact-out -Force
          Get-ChildItem -Path artifact-out -File | Format-Table Name, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ needs.version.outputs.full_version }}-${{ matrix.asset_suffix }}
          path: artifact-out/*
          if-no-files-found: error

  release:
    name: Create Release & Upload Assets
    needs: [version, build]
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      APP_NAME: FreeCleaner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          merge-multiple: false

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Get-ChildItem -Path downloaded-artifacts -Recurse -File | Format-Table FullName, Length
          $exeFiles = Get-ChildItem -Path downloaded-artifacts -Recurse -File -Filter "*.exe"
          if (-not $exeFiles -or $exeFiles.Count -eq 0) {
            throw "No .exe files were downloaded from build artifacts."
          }
          foreach ($file in $exeFiles) {
            Copy-Item -Path $file.FullName -Destination (Join-Path release-assets $file.Name) -Force
          }
          $releaseFiles = Get-ChildItem -Path release-assets -File -Filter "*.exe"
          if (-not $releaseFiles -or $releaseFiles.Count -eq 0) {
            throw "release-assets/*.exe was not created."
          }
          $releaseFiles | Format-Table Name, Length

      - name: Create Git Tag
        if: needs.version.outputs.create_tag == 'true'
        shell: pwsh
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "${{ needs.version.outputs.tag_name }}"
          git push origin "${{ needs.version.outputs.tag_name }}"

      - name: Generate release notes
        id: git_cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.APP_NAME }} ${{ needs.version.outputs.full_version }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
          files: release-assets/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
