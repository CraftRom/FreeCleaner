name: Quality checks

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-2022
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: x64
          cache: pip

      - name: Install validation dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements-dev.txt

      - name: Validate clean source tree
        shell: pwsh
        run: python -B scripts/validate_source_tree.py

      - name: Validate translations
        shell: pwsh
        run: python -B scripts/validate_translations.py

      - name: Compile Python sources
        shell: pwsh
        run: |
          python -m compileall -q .
          Get-ChildItem -Path . -Recurse -Directory -Filter __pycache__ | Remove-Item -Recurse -Force

      - name: Ruff
        shell: pwsh
        run: ruff check . --no-cache

      - name: Typed contract checks
        shell: pwsh
        run: |
          mypy freecleaner/models.py `
            scripts/validate_release_metadata.py `
            scripts/validate_source_tree.py `
            scripts/validate_translations.py `
            --no-incremental

      - name: Unit tests
        shell: pwsh
        run: python -B -m pytest -q -p no:cacheprovider

      - name: Dependency audit
        shell: pwsh
        run: pip-audit -r requirements.txt --progress-spinner off
