name: Quality

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: freecleaner-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x64
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements-dev.txt

      - name: Validate source tree
        run: python -B scripts/validate_source_tree.py

      - name: Validate translations
        run: python -B scripts/validate_translations.py

      - name: Ruff
        run: python -m ruff check . --no-cache

      - name: Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -B -m pytest -q -p no:cacheprovider

      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt --progress-spinner off
